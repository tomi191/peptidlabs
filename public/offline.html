<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline · PeptidLabs</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        background: #fafaf9; color: #0f172a;
        -webkit-font-smoothing: antialiased;
      }
      main {
        min-height: 100dvh;
        display: grid; place-items: center;
        padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      }
      .card {
        max-width: 380px; width: 100%;
        background: #fff;
        border: 1px solid #f5f5f4;
        border-radius: 28px;
        padding: 32px 24px;
        text-align: center;
        box-shadow: 0 8px 32px -16px rgba(15, 23, 42, 0.12);
      }
      .badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 999px;
        background: #f0fdfa; color: #0d9488;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase;
        font-feature-settings: "tnum";
      }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: #0d9488; animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.4 } 50% { opacity: 1 } }
      h1 { margin: 20px 0 8px; font-size: 24px; letter-spacing: -0.02em; line-height: 1.15; text-wrap: balance; }
      p { margin: 0 0 24px; color: #57534e; font-size: 15px; line-height: 1.55; text-wrap: pretty; }
      button {
        appearance: none; border: 0; cursor: pointer;
        width: 100%;
        padding: 14px 20px;
        font-size: 15px; font-weight: 600;
        background: #0f172a; color: #fff;
        border-radius: 14px;
        font-family: inherit;
        transition: transform 0.15s ease;
      }
      button:active { transform: scale(0.97); }
      .logo {
        display: inline-flex; align-items: center; gap: 8px;
        margin-bottom: 24px;
      }
      .logo-mark {
        width: 32px; height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, #0f172a, #0d9488);
        color: #fff; display: grid; place-items: center;
        font-weight: 700;
      }
      .logo-text { font-weight: 600; letter-spacing: 0.18em; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="logo">
          <span class="logo-mark">P</span>
          <span class="logo-text">PEPTIDLABS</span>
        </div>
        <span class="badge"><span class="dot"></span>OFFLINE</span>
        <h1>Изглежда няма връзка</h1>
        <p>Проверете мрежата си и опитайте отново. Кешираните страници остават достъпни.</p>
        <button onclick="location.reload()">Опитай отново</button>
      </div>
    </main>
  </body>
</html>
