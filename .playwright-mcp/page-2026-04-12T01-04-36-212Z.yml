            - heading "Накратко" [level=3] [ref=e186]
            - paragraph [ref=e187]: BPC-157 е един от най-проучваните пептиди за възстановяване. Този флакон съдържа 5mg лиофилизиран прах с HPLC верифицирана чистота ≥99%.
          - paragraph [ref=e188]: BPC-157 5mg е лиофилизиран прах с изследователско качество, доставян в стерилен стъклен флакон. Чистотата е верифицирана чрез HPLC анализ с резултат ≥99%, като всяка партида е придружена от независим Сертификат за анализ (COA). В научната литература BPC-157 (Body Protection Compound-157) е сред най-интензивно проучваните пептиди за регенеративни процеси. Публикувани изследвания документират ефекти върху заздравяването на сухожилия и лигаменти, защитни свойства за чревната лигавица и модулиране на системата на азотния оксид. Проучвания in vivo описват и потенциал за невропротекция и ускорено възстановяване след тъканни увреждания. Продуктът се доставя в лиофилизирана форма за максимална стабилност. Съхранявайте при -20°C преди реконституция. Реконституираният разтвор е стабилен до 21 дни при 2-8°C. Всяка поръчка включва COA с HPLC хроматограма и данни за чистота. Продуктът е предназначен единствено за научноизследователски цели in vitro.
